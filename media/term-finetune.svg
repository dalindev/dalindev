<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="finetune.v17 qwen-3.6-27b LoRA training monitor">

  <!-- Window background -->
  <rect width="800" height="240" rx="10" fill="#0d1117" stroke="#30363d"/>

  <!-- Title bar -->
  <path d="M 0,10 A 10,10 0 0 1 10,0 L 790,0 A 10,10 0 0 1 800,10 L 800,36 L 0,36 Z" fill="#161b22"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#30363d"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="11" fill="#6e7681" letter-spacing="1">finetune.v17 — qwen-3.6-27b · A100</text>

  <!-- TRAINING indicator -->
  <g transform="translate(710, 22)" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="1">
    <circle cx="-12" cy="-4" r="4" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="0" fill="#4ade80">TRAINING</text>
  </g>

  <!-- Body content (uses inheritance for font + default fill) -->
  <g font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="12" fill="#c9d1d9">

    <!-- Row 1: EPOCH / STEP / progress bar / % -->
    <text x="24" y="64"><tspan fill="#6e7681">EPOCH</tspan> <tspan fill="#c9d1d9" font-weight="700">12/16</tspan>  ·  <tspan fill="#6e7681">STEP</tspan></text>

    <!-- Step counter: 3 states cycling over 9s loop -->
    <text x="162" y="64" font-weight="700" fill="#c9d1d9">1258<animate attributeName="opacity" values="1;1;0;0;0;0" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="9s" repeatCount="indefinite"/></text>
    <text x="162" y="64" font-weight="700" fill="#c9d1d9" opacity="0">1264<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="9s" repeatCount="indefinite"/></text>
    <text x="162" y="64" font-weight="700" fill="#c9d1d9" opacity="0">1271<animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="9s" repeatCount="indefinite"/></text>

    <text x="200" y="64" fill="#6e7681">/2000</text>

    <!-- Progress bar -->
    <rect x="260" y="55" width="200" height="11" fill="#21262d" rx="2"/>
    <rect x="260" y="55" height="11" fill="#4ade80" rx="2" width="126">
      <animate attributeName="width" values="126;128;130;132;135;126" keyTimes="0;0.25;0.5;0.75;0.9;1" dur="9s" repeatCount="indefinite"/>
    </rect>

    <!-- % counter: 3 states -->
    <text x="472" y="64" font-weight="700" fill="#fbbf24">63%<animate attributeName="opacity" values="1;1;0;0;0;0" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="9s" repeatCount="indefinite"/></text>
    <text x="472" y="64" font-weight="700" fill="#fbbf24" opacity="0">64%<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="9s" repeatCount="indefinite"/></text>
    <text x="472" y="64" font-weight="700" fill="#fbbf24" opacity="0">66%<animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="9s" repeatCount="indefinite"/></text>

    <!-- Row 2: loss / val / lr -->
    <text x="24" y="86"><tspan fill="#6e7681">loss</tspan>  <tspan fill="#4ade80" font-weight="700">0.298</tspan> <tspan fill="#4ade80" font-size="10">↓0.005</tspan>   <tspan fill="#6e7681">val</tspan>  <tspan fill="#4ade80" font-weight="700">0.270</tspan> <tspan fill="#4ade80" font-size="10">↓0.008</tspan>   <tspan fill="#6e7681">lr</tspan>  <tspan fill="#fbbf24" font-weight="700">2.4e-5</tspan></text>

    <!-- Divider -->
    <line x1="24" y1="100" x2="776" y2="100" stroke="#21262d"/>

    <!-- Row 3: GPU bar -->
    <text x="24" y="120" fill="#6e7681">GPU</text>
    <rect x="64" y="111" width="100" height="11" fill="#21262d" rx="2"/>
    <rect x="64" y="111" width="75" height="11" fill="#60a5fa" rx="2">
      <animate attributeName="width" values="73;78;72;76;74;75;73" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="176" y="120"><tspan fill="#c9d1d9" font-weight="700">75%</tspan>   <tspan fill="#6e7681">VRAM</tspan> <tspan fill="#c9d1d9" font-weight="700">60.0</tspan><tspan fill="#6e7681">/80GB</tspan>   <tspan fill="#4ade80" font-weight="700">73°C</tspan></text>

    <!-- Row 4: CPU bar -->
    <text x="24" y="142" fill="#6e7681">CPU</text>
    <rect x="64" y="133" width="100" height="11" fill="#21262d" rx="2"/>
    <rect x="64" y="133" width="36" height="11" fill="#60a5fa" rx="2">
      <animate attributeName="width" values="36;42;38;34;40;36" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="176" y="142"><tspan fill="#c9d1d9" font-weight="700">36%</tspan>   <tspan fill="#6e7681">RAM </tspan> <tspan fill="#c9d1d9" font-weight="700">45.1</tspan><tspan fill="#6e7681">/64GB</tspan></text>

    <!-- Divider -->
    <line x1="24" y1="156" x2="776" y2="156" stroke="#21262d"/>

    <!-- Recent log -->
    <text x="24" y="176" font-size="11" fill="#4b5563">[step 1258] loss 0.298  grad 0.47</text>
    <text x="24" y="194" font-size="11" fill="#4b5563">[step 1257] loss 0.304  grad 0.33</text>
    <text x="24" y="212" font-size="11" fill="#4b5563">[step 1256] loss 0.301  grad 0.41</text>

  </g>
</svg>
